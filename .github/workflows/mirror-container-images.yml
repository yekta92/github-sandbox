name: Download Container Images & Save to Repo

on:
  push:
    branches:
      - "**"

jobs:
  save-images:
    if: startsWith(github.event.head_commit.message, 'dl-image:')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Parse commit message
        id: parse
        shell: bash
        run: |
          set -euo pipefail

          MSG="$(git log -1 --pretty=%B)"
          echo "Commit message:"
          printf '%s\n' "$MSG"

          if [[ "$MSG" =~ ^dl-image:[[:space:]]*(.+)$ ]]; then
            echo "images=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "❌ No dl-image command found"
            exit 1
          fi

      - name: Pull images and save tar archives
        shell: bash
        run: |
          set -euo pipefail

          BASE_DIR="downloads/images"
          TMP_DIR="tmp_images"
          mkdir -p "$BASE_DIR" "$TMP_DIR"

          LIMIT=$((90 * 1024 * 1024))
          IMAGES='${{ steps.parse.outputs.images }}'

          for IMAGE in $IMAGES; do
            # Normalize image name → safe folder
            SAFE_NAME=$(echo "$IMAGE" | sed 's/[^a-zA-Z0-9._-]/-/g')

            IMAGE_DIR="$BASE_DIR/$SAFE_NAME"
            mkdir -p "$IMAGE_DIR"

            TMP_TAR="$TMP_DIR/${SAFE_NAME}.tar"

            echo "⬇️ Processing image: $IMAGE"
            echo "   Folder: $IMAGE_DIR"

            if command -v docker >/dev/null 2>&1; then
              docker pull "$IMAGE"
              docker save -o "$TMP_TAR" "$IMAGE"
            elif command -v podman >/dev/null 2>&1; then
              podman pull "$IMAGE"
              podman save -o "$TMP_TAR" "$IMAGE"
            else
              echo "❌ Neither docker nor podman is available"
              exit 1
            fi

            SIZE=$(stat -c%s "$TMP_TAR")
            echo "   Size: $(( SIZE / 1024 / 1024 )) MB"

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ Splitting into 90MB parts"

              split -b 90m -d -a 3 \
                "$TMP_TAR" \
                "$IMAGE_DIR/${SAFE_NAME}.tar.part-"

              rm -f "$TMP_TAR"

              echo "✅ Parts:"
              ls -1 "$IMAGE_DIR"
            else
              mv "$TMP_TAR" "$IMAGE_DIR/${SAFE_NAME}.tar"
              echo "✅ Saved without splitting"
            fi
          done

          rm -rf "$TMP_DIR"

      - name: Commit & Push in batches
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mapfile -t ALL_FILES < <(find downloads/images -type f | sort)

          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$((BATCH_NUM + 1))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "🚀 Batch $BATCH_NUM: $((i+1))–$(( i + ${#BATCH[@]} ))"

            git add -- "${BATCH[@]}"
            git commit -m "Add images — batch $BATCH_NUM [skip ci]"

            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"

            echo "✅ Done batch $BATCH_NUM"
          done

          echo "🎉 All files pushed"
