name: Delete Files/Folders from Downloads

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Path inside downloads/ to delete (e.g. images/nginx-latest or file.tar)"
        required: true
        type: string

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Validate and delete target
        shell: bash
        run: |
          set -euo pipefail

          INPUT_PATH="${{ github.event.inputs.target }}"
          BASE_DIR="downloads"

          # Normalize path (remove leading slashes)
          INPUT_PATH="${INPUT_PATH#/}"

          TARGET_PATH="$BASE_DIR/$INPUT_PATH"

          echo "Requested delete: $TARGET_PATH"

          # 🚫 Safety checks
          if [[ "$INPUT_PATH" == "" ]]; then
            echo "❌ Empty input is not allowed"
            exit 1
          fi

          if [[ "$INPUT_PATH" == "." || "$INPUT_PATH" == ".." ]]; then
            echo "❌ Invalid path"
            exit 1
          fi

          if [[ ! -e "$TARGET_PATH" ]]; then
            echo "❌ Path does not exist: $TARGET_PATH"
            exit 1
          fi

          # Extra safety: ensure it's inside downloads/
          REAL_BASE=$(realpath "$BASE_DIR")
          REAL_TARGET=$(realpath "$TARGET_PATH")

          if [[ "$REAL_TARGET" != "$REAL_BASE"* ]]; then
            echo "❌ Path escape detected"
            exit 1
          fi

          echo "🗑️ Deleting: $REAL_TARGET"
          rm -rf "$TARGET_PATH"

      - name: Commit & Push
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF_NAME}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Stage deletions
          git add -A downloads

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Delete from downloads: ${{ github.event.inputs.target }} [skip ci]"

          git pull --rebase origin "$BRANCH"
          git push origin HEAD:"$BRANCH"

          echo "✅ Deletion committed and pushed"
