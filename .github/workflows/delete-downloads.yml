name: Delete Files/Folders from Downloads

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Space-separated paths inside downloads/ OR 'everything!'"
        required: true
        type: string

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Validate and delete targets
        shell: bash
        run: |
          set -euo pipefail

          BASE_DIR="downloads"
          INPUT="${{ github.event.inputs.target }}"

          echo "Input: $INPUT"

          if [[ ! -d "$BASE_DIR" ]]; then
            echo "No downloads directory exists"
            exit 0
          fi

          # 🚨 FULL WIPE
          if [[ "$INPUT" == "everything!" ]]; then
            echo "🔥 Deleting EVERYTHING inside $BASE_DIR"
            rm -rf "$BASE_DIR"/*
            exit 0
          fi

          # Convert input into array
          read -ra TARGETS <<< "$INPUT"

          REAL_BASE=$(realpath "$BASE_DIR")

          for ITEM in "${TARGETS[@]}"; do
            ITEM="${ITEM#/}"  # remove leading slash
            TARGET_PATH="$BASE_DIR/$ITEM"

            echo "➡️ Processing: $TARGET_PATH"

            if [[ "$ITEM" == "" || "$ITEM" == "." || "$ITEM" == ".." ]]; then
              echo "❌ Invalid path: $ITEM"
              continue
            fi

            if [[ ! -e "$TARGET_PATH" ]]; then
              echo "⚠️ Not found: $TARGET_PATH (skipped)"
              continue
            fi

            REAL_TARGET=$(realpath "$TARGET_PATH")

            # 🔒 Ensure inside downloads/
            if [[ "$REAL_TARGET" != "$REAL_BASE"* ]]; then
              echo "❌ Path escape attempt: $ITEM"
              continue
            fi

            echo "🗑️ Deleting: $REAL_TARGET"
            rm -rf "$TARGET_PATH"
          done

      - name: Commit & Push
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF_NAME}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A downloads

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Delete from downloads: ${{ github.event.inputs.target }} [skip ci]"

          git pull --rebase origin "$BRANCH"
          git push origin HEAD:"$BRANCH"

          echo "✅ Deletions pushed"
